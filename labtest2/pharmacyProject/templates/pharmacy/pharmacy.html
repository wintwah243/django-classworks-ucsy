<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
<!--    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">-->
    <title>Medicine List</title>
</head>
<body>
<div class="container">
    <h4>Medicine List</h4>
    <table class = "table table-bordered">
        <tr>
            <th>Medicine Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Expiry Date</th>
            <th>Description</th>
            <th colspan="2">Action</th>
        </tr>
        {% for pharmacy in pharmacries %}
        <tr>
            <td>{{ pharmacy.name }}</td>
            <td>{{ pharmacy.category }}</td>
            <td>{{ pharmacy.price }}</td>
            <td>{{ pharmacy.quantity }}</td>
            <td>{{ pharmacy.expiry_date }}</td>
            <td>{{ pharmacy.description }}</td>
            <td><a href='/update/{{pharmacy.id}}'>Edit</a></td>
            <td><a href='/delete/{{pharmacy.id}}'>Delete</a></td>
        </tr>
        {% endfor %}
    </table> <br/>
    <button class = "btn btn-primary" onclick="location.href='{% url 'new' %}'">Add New Medicine</button>
</div>

</body>
</html>
