<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Item List</title>
</head>
<body>
    <div>
        <h4>Item List</h4>
        <table>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Action</th>
            </tr>
            {% for practice3 in practice3data %}
            <tr>
                <td>{{practice3.name}}</td>
                <td>{{practice3.email}}</td>
                <td><a href="/update/{{practice3.id}}">Edit</a></td>
                <td><a href="/delete/{{practice3.id}}">Delete</a></td>
            </tr>
            {% endfor %}
        </table> <br>
        <button onclick="location.href='{% url 'new' %}'">add new item</button>
    </div>
</body>
</html>
