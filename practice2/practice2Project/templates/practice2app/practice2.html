<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Item list</title>
</head>
<body>
    <div>
        <h4>Item List</h4>
        <table>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Action</th>
            </tr>
            {% for practice2 in practice2data %}
            <tr>
                <td>{{practice2.name}}</td>
                <td>{{practice2.email}}</td>
                <td><a href="/update/{{practice2.id}}">Edit</a></td>
                <td><a href="/delete/{{practice2.id}}">Delete</a></td>
            </tr>
            {% endfor %}
        </table> <br>
        <button onclick="location.href='{% url 'new' %}'">Add new item</button>
    </div>
</body>
</html>
